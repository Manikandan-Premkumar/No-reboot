version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: no-reboot-postgres
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: no_reboot_hq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: no-reboot-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
      DB_NAME: no_reboot_hq
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src  # For hot reload in development
      - /app/node_modules

volumes:
  postgres_data: